<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Productos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

  <div class="container mt-5">

    <div class="card shadow-lg rounded-4">
      
      <div class="card-header bg-primary text-white text-center">
        <h3 class="mb-0">📦 Lista de Productos</h3>
      </div>

      <div class="card-body">

        {% if mensaje_error %}
        <div class="alert alert-danger" role="alert">
          {{ mensaje_error }}
        </div>
        {% endif %}

        <form class="row g-3 mb-4" method="post"
              action="{% if producto_editar %}{{ url_for('productos_c.editar_producto', idproducto=producto_editar.idproducto) }}{% else %}{{ url_for('productos_c.crear_nuevo_producto') }}{% endif %}">
          <div class="col-md-5">
            <label for="producto" class="form-label">Producto</label>
            <input type="text" class="form-control" id="producto" name="producto"
                   value="{% if form_data and form_data.producto %}{{ form_data.producto }}{% elif producto_editar %}{{ producto_editar.producto }}{% endif %}" required>
          </div>

          <div class="col-md-3">
            <label for="marca" class="form-label">Marca</label>
            <input type="text" class="form-control" id="marca" name="marca"
                   value="{% if form_data and form_data.marca %}{{ form_data.marca }}{% elif producto_editar %}{{ producto_editar.marca }}{% endif %}" required>
          </div>

          <div class="col-md-2">
            <label for="precio" class="form-label">Precio</label>
            <input type="number" step="0.01" class="form-control" id="precio" name="precio"
                   value="{% if form_data and form_data.precio %}{{ form_data.precio }}{% elif producto_editar %}{{ producto_editar.precio }}{% endif %}" min="0.01" required>
          </div>

          <div class="col-md-6">
            <label for="descripcion" class="form-label">Descripcion imagen</label>
            <input type="text" class="form-control" id="descripcion" name="descripcion"
                   value="{% if form_data and form_data.descripcion %}{{ form_data.descripcion }}{% elif imagen_editar %}{{ imagen_editar.descripcion }}{% endif %}"
                   minlength="4" maxlength="180" required>
          </div>

          <div class="col-md-4">
            <label for="url" class="form-label">URL imagen</label>
            <input type="url" class="form-control" id="url" name="url"
                   value="{% if form_data and form_data.url %}{{ form_data.url }}{% elif imagen_editar %}{{ imagen_editar.url }}{% endif %}"
                   placeholder="https://..." required>
          </div>

          <div class="col-md-2 d-flex align-items-end gap-2">
            <button type="submit" class="btn {% if producto_editar %}btn-warning{% else %}btn-success{% endif %} w-100">
              {% if producto_editar %}Actualizar{% else %}Agregar{% endif %}
            </button>
            {% if producto_editar %}
            <a href="{{ url_for('productos_c.obtener_productos') }}" class="btn btn-outline-secondary w-100">Cancelar</a>
            {% endif %}
          </div>
        </form>

        <table class="table table-hover table-bordered align-middle text-center">
          
          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>Producto</th>
              <th>Marca</th>
              <th>Precio</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody>
            {% for i in data %}
            <tr>
              <th scope="row">{{ i.idproducto }}</th>

              <td class="fw-semibold">
                {{ i.producto }}
              </td>

              <td>
                <span class="badge bg-secondary">
                  {{ i.marca }}
                </span>
              </td>

              <td class="text-success fw-bold">
                $ {{ i.precio }}
              </td>

              <td>
                <div class="d-flex justify-content-center gap-2">
                  <a class="btn btn-sm btn-outline-primary"
                     href="{{ url_for('productos_c.editar_producto', idproducto=i.idproducto) }}">
                    Editar
                  </a>

                  <form method="post"
                        action="{{ url_for('productos_c.eliminar_un_producto', idproducto=i.idproducto) }}"
                        onsubmit="return confirm('¿Seguro que deseas eliminar este producto?');">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                  </form>
                </div>
              </td>
            </tr>
            {% endfor %}
          </tbody>

        </table>

      </div>

    </div>

  </div>

</body>
</html>
